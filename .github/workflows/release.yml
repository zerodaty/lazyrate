name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tooling
        run: |
          sudo apt-get update
          # python3-pip y python3-setuptools son Build-Depends de debian/control:
          # sin ellos dpkg-checkbuilddeps aborta el build
          sudo apt-get install -y debhelper devscripts python3-pip python3-setuptools

      - name: Link debian directory
        run: ln -sfn packaging/debian debian

      - name: Set changelog version from tag
        env:
          DEBEMAIL: zerodaty@gmail.com
          DEBFULLNAME: Frany Velasquez
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          dch --newversion "${TAG}-1" --distribution noble "Release ${GITHUB_REF_NAME}"

      - name: Build .deb
        run: |
          set -o pipefail
          # En fallo, las últimas líneas salen como anotaciones (visibles sin auth)
          dpkg-buildpackage -us -uc -b 2>&1 | tee build.log || {
            tail -n 15 build.log | while IFS= read -r line; do echo "::error::${line}"; done
            exit 1
          }

      - name: Collect artifacts
        run: |
          mkdir dist
          mv ../lazyrate_*_all.deb dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
